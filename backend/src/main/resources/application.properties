server.port=${SERVER_PORT:8080}
spring.application.name=stackoverflow

# MySQL configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/stackoverflow_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:stackoverflow_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:stackoverflow_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.cache.type=${SPRING_CACHE_TYPE:redis}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}

spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID:stackoverflow-api-local}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.demo
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.demo.QuestionEvent
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.max.block.ms=${KAFKA_MAX_BLOCK_MS:3000}
spring.kafka.listener.missing-topics-fatal=false

app.kafka.enabled=${APP_KAFKA_ENABLED:true}
app.kafka.topic.stackoverflow-events=${STACKOVERFLOW_EVENTS_TOPIC:stackoverflow.events}
app.kafka.consumer-group.feed=${STACKOVERFLOW_FEED_CONSUMER_GROUP:stackoverflow-feed-local}
app.kafka.consumer-group.search=${STACKOVERFLOW_SEARCH_CONSUMER_GROUP:stackoverflow-search-indexer}

app.search.enabled=${APP_SEARCH_ENABLED:true}
app.search.elasticsearch-url=${ELASTICSEARCH_URL:http://localhost:9200}
app.search.index=${ELASTICSEARCH_INDEX:stackoverflow_questions}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
